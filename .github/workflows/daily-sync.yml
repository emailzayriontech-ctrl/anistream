name: Daily YouTube Playlist Sync & GitHub Pages Deploy

on:
  push:
    branches:
      - main
  schedule:
    # Runs at 17:00 UTC (00:00 midnight WIB / GMT+7) every day
    - cron: '0 17 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write  # Required to push commits to the repo
  pages: write     # Required to deploy to GitHub Pages
  id-token: write  # Required for OIDC token (GitHub Pages deploy)

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Playlist Sync Script
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          VITE_YOUTUBE_API_KEY: ${{ secrets.VITE_YOUTUBE_API_KEY }}
        run: npm run sync-playlists

      - name: Build Site
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Commit and Push Mappings
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-sync YouTube playlists [skip ci]"
          file_pattern: "src/data/animePlaylistMap.json failed-playlists.json"
