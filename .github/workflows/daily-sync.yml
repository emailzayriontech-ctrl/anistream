name: Daily YouTube Playlist Sync & FTP Deploy

on:
  push:
    branches:
      - main
  schedule:
    # Runs at 17:00 UTC (00:00 midnight WIB / GMT+7) every day
    - cron: '0 17 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write # Required to push commits to the repo

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Playlist Sync Script
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          VITE_YOUTUBE_API_KEY: ${{ secrets.VITE_YOUTUBE_API_KEY }}
        run: npm run sync-playlists

      - name: Build Site
        run: npm run build

      - name: Deploy to Hostdata.id (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR || 'public_html/' }}
          local-dir: './dist/'
          security: loose
          timeout: 120000

      - name: Commit and Push Mappings
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add src/data/animePlaylistMap.json failed-playlists.json || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-sync YouTube playlists [skip ci]" && git pull --rebase origin main && git push)
