name: Daily YouTube Playlist Sync

on:
  schedule:
    # Runs at 17:00 UTC (00:00 midnight WIB / GMT+7) every day
    - cron: '0 17 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write # Required to push commits to the repo

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-node: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Playlist Sync Script
        env:
          VITE_YOUTUBE_API_KEY: ${{ secrets.VITE_YOUTUBE_API_KEY }}
        run: npm run sync-playlists

      - name: Commit and Push Mappings
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add src/data/animePlaylistMap.json failed-playlists.json || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-sync YouTube playlists [skip ci]" && git push)
